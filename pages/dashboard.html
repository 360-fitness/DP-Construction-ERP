<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard · DP Construction ERP</title>
<link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar__brand">
      <div class="sidebar__brand-name">DP Construction</div>
      <div class="sidebar__brand-sub">ERP System</div>
    </div>
    <nav class="sidebar__nav" id="sidebar-nav"></nav>
    <div class="sidebar__footer" id="sidebar-footer"></div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar__search">
        <span class="topbar__search-icon">⌕</span>
        <input type="text" placeholder="Search clients, projects, invoices…" id="global-search" />
      </div>
      <div class="topbar__actions">
        <button class="icon-btn" id="theme-toggle" title="Toggle theme"></button>
        <button class="icon-btn" title="Notifications">🔔</button>
      </div>
    </header>

    <main class="content">
      <div class="page-header">
        <div>
          <h1>Dashboard</h1>
          <div class="page-header__meta" id="welcome-msg">Loading…</div>
        </div>
        <div class="flex gap-8">
          <a href="clients.html" class="btn btn--primary">+ New Client</a>
        </div>
      </div>

      <div class="stat-grid" id="stat-grid">
        <div class="loading-row"><span class="spinner"></span> Loading dashboard…</div>
      </div>

      <div class="card">
        <div class="flex-between mt-16" style="margin-bottom:14px;">
          <h3 style="font-size:16px;">Recently Added Clients</h3>
          <a href="clients.html" class="btn btn--ghost btn--sm">View All Clients</a>
        </div>
        <div id="recent-clients"></div>
      </div>
    </main>
  </div>
</div>

<script type="module" src="../js/pages/dashboard.js"></script>
</body>
</html>
