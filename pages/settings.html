<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Settings · DP Construction ERP</title>
<link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar__brand">
      <div class="sidebar__brand-name">DP Construction</div>
      <div class="sidebar__brand-sub">ERP System</div>
    </div>
    <nav class="sidebar__nav" id="sidebar-nav"></nav>
    <div class="sidebar__footer" id="sidebar-footer"></div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar__search">
        <span class="topbar__search-icon">⌕</span>
        <input type="text" placeholder="Search…" />
      </div>
      <div class="topbar__actions">
        <button class="icon-btn" id="theme-toggle" title="Toggle theme"></button>
      </div>
    </header>

    <main class="content">
      <div class="page-header">
        <div>
          <h1>Company Settings</h1>
          <div class="page-header__meta">Administrator only — controls what appears on quotes, invoices and payslips.</div>
        </div>
      </div>

      <div class="card" style="max-width:680px;">
        <form id="settings-form">
          <div class="field">
            <label>Company Logo</label>
            <div class="flex gap-16" style="align-items:center;">
              <img id="logo-preview" src="" alt="" style="width:64px;height:64px;object-fit:contain;border:1px solid var(--border);border-radius:6px;display:none;background:#fff;" />
              <input type="file" id="logo-input" accept="image/*" />
            </div>
          </div>

          <div class="form-row">
            <div class="field">
              <label for="s-name">Company Name</label>
              <input type="text" id="s-name" value="DP Construction Group (Pty) Ltd" />
            </div>
            <div class="field">
              <label for="s-trading">Trading Name</label>
              <input type="text" id="s-trading" value="DP Construction &amp; Maintenance" />
            </div>
          </div>

          <div class="form-row">
            <div class="field">
              <label for="s-reg">Company Registration Number</label>
              <input type="text" id="s-reg" />
            </div>
            <div class="field">
              <label for="s-vat">VAT Number</label>
              <input type="text" id="s-vat" />
            </div>
          </div>

          <div class="form-row">
            <div class="field">
              <label for="s-phone">Phone</label>
              <input type="tel" id="s-phone" />
            </div>
            <div class="field">
              <label for="s-email">Email</label>
              <input type="email" id="s-email" />
            </div>
          </div>

          <div class="field">
            <label for="s-address">Registered Address</label>
            <textarea id="s-address"></textarea>
          </div>

          <h3 style="font-size:15px;margin:24px 0 14px;">Banking Details</h3>
          <div class="form-row">
            <div class="field">
              <label for="s-bank-name">Bank</label>
              <input type="text" id="s-bank-name" />
            </div>
            <div class="field">
              <label for="s-bank-acc">Account Number</label>
              <input type="text" id="s-bank-acc" />
            </div>
          </div>
          <div class="form-row">
            <div class="field">
              <label for="s-bank-branch">Branch Code</label>
              <input type="text" id="s-bank-branch" />
            </div>
            <div class="field">
              <label for="s-bank-type">Account Type</label>
              <select id="s-bank-type">
                <option value="Cheque">Cheque / Current</option>
                <option value="Savings">Savings</option>
              </select>
            </div>
          </div>

          <h3 style="font-size:15px;margin:24px 0 14px;">Quote &amp; Invoice Defaults</h3>
          <div class="form-row">
            <div class="field">
              <label for="s-vat-rate">Default VAT Rate (%)</label>
              <input type="number" id="s-vat-rate" value="15" step="0.1" />
            </div>
            <div class="field">
              <label for="s-quote-validity">Quote Validity (days)</label>
              <input type="number" id="s-quote-validity" value="30" />
            </div>
          </div>
          <div class="field">
            <label for="s-terms">Standard Terms &amp; Conditions</label>
            <textarea id="s-terms" placeholder="Shown at the bottom of every quote and invoice"></textarea>
          </div>

          <div class="modal__actions" style="justify-content:flex-start;">
            <button type="submit" class="btn btn--primary" id="settings-save-btn">Save Settings</button>
          </div>
        </form>
      </div>
    </main>
  </div>
</div>

<script type="module" src="../js/pages/settings.js"></script>
</body>
</html>
