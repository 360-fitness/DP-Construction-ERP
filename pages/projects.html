<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Projects · DP Construction ERP</title>
<link rel="stylesheet" href="../assets/css/main.css" />
</head>
<body>

<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar__brand">
      <img src="../assets/images/company-logo.jpeg" alt="DP Construction logo" class="sidebar__logo" />
      <div class="sidebar__brand-name">DP Construction</div>
      <div class="sidebar__brand-sub">ERP System</div>
    </div>
    <nav class="sidebar__nav" id="sidebar-nav"></nav>
    <div class="sidebar__footer" id="sidebar-footer"></div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar__search">
        <span class="topbar__search-icon">⌕</span>
        <input type="text" id="project-search" placeholder="Search by project number, client, name…" />
      </div>
      <div class="topbar__actions">
        <button class="icon-btn" id="theme-toggle" title="Toggle theme"></button>
      </div>
    </header>

    <main class="content">
      <div class="page-header">
        <div>
          <h1>Projects</h1>
          <div class="page-header__meta" id="project-count-msg">Loading…</div>
        </div>
        <div class="flex gap-8">
          <select id="status-filter" style="padding:9px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);">
            <option value="">All Statuses</option>
            <option>Planning</option><option>In Progress</option><option>On Hold</option><option>Completed</option><option>Cancelled</option>
          </select>
          <button class="btn btn--primary" id="add-project-btn">+ New Project</button>
        </div>
      </div>

      <div id="projects-container">
        <div class="loading-row"><span class="spinner"></span> Loading projects…</div>
      </div>
    </main>
  </div>
</div>

<!-- Add / Edit Project Modal -->
<div class="modal-overlay" id="project-modal-overlay">
  <div class="modal">
    <div class="modal__header">
      <h3 id="project-modal-title" style="font-size:18px;">New Project</h3>
      <button class="modal__close" id="project-modal-close-btn">✕</button>
    </div>
    <form id="project-form">
      <input type="hidden" id="p-id" />
      <div class="field">
        <label for="p-client">Client *</label>
        <select id="p-client" required></select>
      </div>
      <div class="field">
        <label for="p-name">Project Name *</label>
        <input type="text" id="p-name" required />
      </div>
      <div class="field">
        <label for="p-site-address">Site Address</label>
        <input type="text" id="p-site-address" />
      </div>
      <div class="field">
        <label for="p-gps">GPS Coordinates</label>
        <input type="text" id="p-gps" placeholder="-33.9249, 18.4241" />
      </div>
      <div class="form-row">
        <div class="field">
          <label for="p-start">Start Date</label>
          <input type="date" id="p-start" />
        </div>
        <div class="field">
          <label for="p-completion">Completion Date</label>
          <input type="date" id="p-completion" />
        </div>
      </div>
      <div class="field">
        <label for="p-status">Status</label>
        <select id="p-status">
          <option>Planning</option><option>In Progress</option><option>On Hold</option><option>Completed</option><option>Cancelled</option>
        </select>
      </div>
      <div class="field">
        <label for="p-notes">Notes</label>
        <textarea id="p-notes"></textarea>
      </div>
      <div class="modal__actions">
        <button type="button" class="btn btn--ghost" id="project-modal-cancel-btn">Cancel</button>
        <button type="submit" class="btn btn--primary" id="project-save-btn">Save Project</button>
      </div>
    </form>
  </div>
</div>

<!-- Project Detail Modal -->
<div class="modal-overlay" id="project-detail-overlay">
  <div class="modal" style="max-width:640px;">
    <div class="modal__header">
      <h3 id="detail-title" style="font-size:18px;">Project</h3>
      <button class="modal__close" id="detail-close-btn">✕</button>
    </div>
    <div id="detail-body"></div>
  </div>
</div>

<script type="module" src="../js/pages/projects.js"></script>
</body>
</html>
